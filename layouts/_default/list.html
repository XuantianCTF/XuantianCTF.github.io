{{- define "main" }}
<div class="content">
	<h1>{{ .Title }}</h1>
	{{ with .Params.description }}<div>{{ markdownify . }}</div>{{ end }}
  {{- .Content }}
  {{ if eq .Kind "taxonomy" }}
  <ol>
    {{ range .Data.Pages }}
      <li>
        <a href="{{ .Permalink }}">
          {{ .Title }}
        </a>
      </li>
    {{ end }}
  </ol>
  {{ end }}
</div>
{{- end }}
