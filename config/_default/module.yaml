# Hugo Modules Configuration

imports:
  - path: github.com/HugoBlox/kit/modules/integrations/netlify
  - path: github.com/HugoBlox/kit/modules/blox

mounts:
  - source: themes/theme-documentation/hugo-blox/blox/community
    target: layouts/_partials/blox/community/
    files:
      - '**.html'
  - source: themes/theme-documentation/hugo-blox/blox/all-access
    target: layouts/_partials/blox/
    files:
      - '**.html'
  - source: themes/theme-documentation/hugo-blox/blox
    target: assets/dist/community/blox/
    files:
      - '**.css'
  - source: layouts
    target: layouts
  - source: assets
    target: assets
