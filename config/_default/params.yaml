# Hugo Blox Configuration
hugoblox:
  schema: "2.0"

  identity:
    name: "玄天 CTF 实验室"
    organization: "Xuantian CTF"
    type: organization
    tagline: "网络安全攻防技术研究与实战训练平台"
    description: "玄天 CTF 实验室是一个专注于网络安全攻防技术研究与实战训练的开放平台。"
    social:
      twitter: ""

  theme:
    mode: system
    pack: "default"
    colors:
      primary: "blue"
      secondary: "indigo"
      neutral: "slate"

  typography:
    pack: "modern"

  layout:
    radius: "md"
    spacing: "spacious"
    avatar_shape: circle

  header:
    enable: true
    style: navbar
    sticky: true
    align: center
    search: true
    theme_toggle: true
    theme_picker: false
    language_switcher: false
    cta:
      enable: false

  footer:
    style: minimal
    language_switcher: false
    text: ""

  copyright:
    notice: "© {year} 玄天 CTF 实验室. All rights reserved."
    license:
      type: cc
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

  seo:
    title: "玄天 CTF 实验室 - 网络安全攻防技术学习平台"
    ai:
      allow:
        - /
      disallow: []

  content:
    math:
      enable: false
    toc:
      enable: true
    reading_time:
      enable: true

  search:
    enable: true
    suggestions: []

  comments:
    enable: false

  analytics:
    google:
      measurement_id: ""

  repository:
    enable: true
    url: "https://github.com/XuantianCTF/XuantianCTF.github.io"
    branch: main
    content_dir: content

  locale:
    date_format: "2006-01-02"
    time_format: "15:04"
    address_format: zh-cn

  debug:
    enable: false

  pro:
    hide_attribution: false
